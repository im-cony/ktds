<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KT DS Projects — Cony</title>
<!-- AI-KMS Design System v1.0 토큰 (라이브) -->
<link rel="stylesheet" href="https://www.subi365.app/ktds/kms/design-system/tokens.css">
<style>
  /* ============================================
   * KTDS Projects Hub — AI-KMS Design System v1.0
   * 모든 색·여백·폰트·그림자·모서리는 디자인 토큰만 사용
   * ============================================ */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    background: var(--color-bg);
    min-height: 100vh;
    color: var(--color-text-primary);
    line-height: var(--line-height-normal);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* KT 시그니처 레드 상단 액센트 */
  body::before {
    content: '';
    display: block;
    height: 4px;
    background: var(--color-brand-500);
  }

  .wrap {
    max-width: 800px;
    margin: 0 auto;
    padding: var(--space-20) var(--space-6);
  }

  .hero {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-xl);
    padding: var(--space-12) var(--space-10);
    box-shadow: var(--shadow-3);
  }

  .badge {
    display: inline-block;
    background: var(--color-brand-50);
    color: var(--color-brand-700);
    padding: var(--space-1) var(--space-3);
    border-radius: var(--radius-full);
    font-size: var(--font-size-caption);
    font-weight: var(--font-weight-semibold);
    margin-bottom: var(--space-4);
  }

  h1 {
    font-size: var(--font-size-h1);
    color: var(--color-text-primary);
    font-weight: var(--font-weight-bold);
    margin-bottom: var(--space-2);
    letter-spacing: var(--letter-spacing-snug);
    line-height: var(--line-height-tight);
  }

  .sub {
    font-size: var(--font-size-body);
    color: var(--color-text-secondary);
    margin-bottom: var(--space-8);
  }

  .grid { display: grid; grid-template-columns: 1fr; gap: var(--space-4); }

  .card {
    display: block;
    text-decoration: none;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: var(--space-6);
    transition: all var(--duration-normal) var(--ease-out);
    color: inherit;
  }
  .card:hover {
    border-color: var(--color-brand-500);
    transform: translateY(-2px);
    box-shadow: var(--shadow-3);
  }
  .card:focus-visible {
    outline: none;
    box-shadow: var(--shadow-focus);
    border-color: var(--color-brand-500);
  }

  .card-icon {
    font-size: var(--font-size-h1);
    margin-bottom: var(--space-2);
    line-height: 1;
  }
  .card-title {
    font-size: var(--font-size-bodyLg, 18px);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text-primary);
    margin-bottom: var(--space-1);
  }
  .card-desc {
    font-size: var(--font-size-caption);
    color: var(--color-text-secondary);
    margin-bottom: var(--space-2);
    line-height: var(--line-height-normal);
  }
  .card-meta {
    font-size: var(--font-size-small);
    color: var(--color-text-tertiary);
  }
  .card-cta {
    display: inline-block;
    color: var(--color-brand-500);
    font-size: var(--font-size-caption);
    font-weight: var(--font-weight-semibold);
    margin-top: var(--space-3);
  }

  footer {
    text-align: center;
    margin-top: var(--space-6);
    color: var(--color-text-tertiary);
    font-size: var(--font-size-caption);
  }
  footer a { color: var(--color-brand-500); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <span class="badge">KT DS · 26년</span>
      <h1>KT DS Projects</h1>
      <p class="sub">진행 중인 KT DS 프로젝트 모음</p>
      <div class="grid">
        <a href="/ktds/kms/" class="card">
          <div class="card-icon">🤖</div>
          <div class="card-title">AI-KMS</div>
          <div class="card-desc">AICC 연계 AI 기반 지식관리시스템 — RAG·LLM 기반 차세대 KMS</div>
          <div class="card-meta">Phase 0 (킥오프) · 2026.05~</div>
          <span class="card-cta">바로가기 ▸</span>
        </a>
        <a href="/ktds/slides/" class="card">
          <div class="card-icon">📊</div>
          <div class="card-title">Slide</div>
          <div class="card-desc">KT DS 프로젝트 발표 자료 모음 — 킥오프·중간보고·결과보고 슬라이드</div>
          <div class="card-meta">2026.05~</div>
          <span class="card-cta">바로가기 ▸</span>
        </a>
      </div>
    </div>
    <footer>
      © 2026 KT DS · <a href="/ktds/kms/design-system">Design System v1.0</a>
    </footer>
  </div>
</body>
</html>
