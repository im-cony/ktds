<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KT DS Projects — Cony</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', 'Malgun Gothic', -apple-system, sans-serif;
    background: linear-gradient(135deg, #1a3a6c 0%, #2e7d32 100%);
    min-height: 100vh;
    color: #2c3e50;
    line-height: 1.6;
  }
  .wrap {
    max-width: 800px;
    margin: 0 auto;
    padding: 80px 24px;
  }
  .hero {
    background: #fff;
    border-radius: 16px;
    padding: 48px 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .badge {
    display: inline-block;
    background: #1a3a6c;
    color: #fff;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 16px;
    letter-spacing: 0.5px;
  }
  h1 {
    font-size: 36px;
    color: #1a3a6c;
    font-weight: 800;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .sub { font-size: 15px; color: #6b7280; margin-bottom: 32px; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
  .card {
    display: block;
    text-decoration: none;
    background: #fff;
    border: 2px solid #e5e7eb;
    border-radius: 10px;
    padding: 24px;
    transition: all 0.2s;
    color: inherit;
  }
  .card:hover {
    border-color: #2e7d32;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(46,125,50,0.15);
  }
  .card-icon { font-size: 32px; margin-bottom: 8px; }
  .card-title { font-size: 18px; font-weight: 700; color: #1a3a6c; margin-bottom: 4px; }
  .card-desc { font-size: 13px; color: #6b7280; margin-bottom: 8px; }
  .card-meta { font-size: 11px; color: #9ca3af; }
  .card-cta { display: inline-block; color: #2e7d32; font-size: 13px; font-weight: 600; margin-top: 12px; }

  footer {
    text-align: center;
    margin-top: 24px;
    color: rgba(255,255,255,0.85);
    font-size: 12px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>KT DS Projects</h1>
      <p class="sub">진행 중인 KT DS 프로젝트 모음</p>
      <div class="grid">
        <a href="/ktds/kms/" class="card">
          <div class="card-icon">🤖</div>
          <div class="card-title">AI-KMS</div>
          <div class="card-desc">AICC 연계 AI 기반 지식관리시스템 — RAG·LLM 기반 차세대 KMS</div>
          <div class="card-meta">Phase 0 (킥오프) · 2026.05~</div>
          <span class="card-cta">바로가기 ▸</span>
        </a>
        <a href="/ktds/slides/" class="card">
          <div class="card-icon">📊</div>
          <div class="card-title">Slide</div>
          <div class="card-desc">KT DS 프로젝트 발표 자료 모음 — 킥오프·중간보고·결과보고 슬라이드</div>
          <div class="card-meta">2026.05~</div>
          <span class="card-cta">바로가기 ▸</span>
        </a>
      </div>
    </div>
    <footer>
      © 2026 KT DS · Powered by Vercel
    </footer>
  </div>
</body>
</html>
